<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Pretendard','Segoe UI',sans-serif" role="img" aria-label="내가 이해한 LLM WIKI 개념도 — 옵시디언 중심">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="888" height="608" rx="22" fill="#FBFCFE" stroke="#E2E8F0" stroke-width="2"/>
  <text x="450" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A">내가 이해한 LLM WIKI</text>

  <!-- LLM (top) -->
  <rect x="330" y="72" width="240" height="76" rx="16" fill="#F1F5F9" stroke="#475569" stroke-width="2"/>
  <text x="365" y="120" font-size="30">🤖</text>
  <text x="470" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">LLM (궂은일)</text>
  <text x="470" y="130" text-anchor="middle" font-size="12" fill="#64748B">조합·검색·정리·링크·저장·인덱싱</text>

  <!-- 나 (left) -->
  <rect x="30" y="300" width="150" height="140" rx="16" fill="#EFF4FF" stroke="#2563EB" stroke-width="2"/>
  <text x="105" y="356" text-anchor="middle" font-size="40">🙋</text>
  <text x="105" y="392" text-anchor="middle" font-size="16" font-weight="700" fill="#1E3A8A">나</text>
  <text x="105" y="414" text-anchor="middle" font-size="12.5" fill="#334155">생각·이해</text>

  <!-- Obsidian vault (center) -->
  <rect x="214" y="206" width="472" height="330" rx="18" fill="#F5F0FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" font-size="16" font-weight="700" fill="#6D28D9">📗 옵시디언 볼트 — 내 파일(md 노트)</text>

  <!-- notes + links inside vault -->
  <line x1="303" y1="282" x2="463" y2="278" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="390" y1="324" x2="463" y2="278" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="303" y1="282" x2="345" y2="364" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="390" y1="324" x2="560" y2="324" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="260" y="270" width="86" height="24" rx="6" fill="#fff" stroke="#7C3AED" stroke-width="1.3"/>
  <rect x="420" y="266" width="86" height="24" rx="6" fill="#fff" stroke="#7C3AED" stroke-width="1.3"/>
  <rect x="340" y="312" width="100" height="24" rx="6" fill="#fff" stroke="#7C3AED" stroke-width="1.3"/>
  <rect x="520" y="312" width="80" height="24" rx="6" fill="#fff" stroke="#7C3AED" stroke-width="1.3"/>
  <rect x="300" y="352" width="110" height="24" rx="6" fill="#fff" stroke="#7C3AED" stroke-width="1.3"/>

  <!-- accumulation (복리) bars -->
  <rect x="400" y="404" width="100" height="15" rx="4" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.4"/>
  <rect x="386" y="424" width="128" height="15" rx="4" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.4"/>
  <rect x="372" y="444" width="156" height="15" rx="4" fill="#86EFAC" stroke="#16A34A" stroke-width="1.4"/>
  <text x="450" y="488" text-anchor="middle" font-size="14" font-weight="700" fill="#15803D">④ 내 '이해'가 쌓이고 서로 연결 (복리)</text>
  <text x="450" y="510" text-anchor="middle" font-size="12" fill="#166534">버려지지 않고, 다른 이해와 조합·연결된다</text>

  <!-- arrows -->
  <!-- ① 나 → 볼트 -->
  <line x1="180" y1="360" x2="214" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
  <circle cx="197" cy="338" r="11" fill="#2563EB"/><text x="197" y="343" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <!-- ② 볼트 → LLM (읽기, RAG) -->
  <line x1="405" y1="206" x2="405" y2="150" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#arP)"/>
  <circle cx="383" cy="178" r="11" fill="#7C3AED"/><text x="383" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="360" y="175" text-anchor="end" font-size="10.5" font-weight="700" fill="#6D28D9">색인</text>
  <text x="360" y="189" text-anchor="end" font-size="10.5" font-weight="700" fill="#6D28D9">먼저</text>
  <!-- ③ LLM → 볼트 (되돌려 저장) -->
  <line x1="497" y1="150" x2="497" y2="206" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
  <circle cx="519" cy="178" r="11" fill="#475569"/><text x="519" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>

  <!-- legend -->
  <text x="30" y="562" font-size="12.5" fill="#334155"><tspan font-weight="700" fill="#2563EB">①</tspan> 나: 내 생각·이해를 있는 그대로 적는다     <tspan font-weight="700" fill="#6D28D9">②</tspan> LLM: 볼트의 파일을 본다 — 색인(index)을 먼저 보고 관련 파일을 연다</text>
  <text x="30" y="586" font-size="12.5" fill="#334155"><tspan font-weight="700" fill="#475569">③</tspan> LLM: 조합·정리·링크해 되돌려 저장     <tspan font-weight="700" fill="#15803D">④</tspan> 그래서 이해가 버려지지 않고 쌓이고 연결된다 (복리) = LLM WIKI</text>
</svg>
